services:
  app:
    build: .
    # Use network_mode: "host" ONLY if your Postgres is running locally on the host OS
    # network_mode: "host" 
    ports:
      - "8080:8080"
    volumes:
      - /your/nfo/folder:/data
    environment:
      # Format: postgresql://USER:PASSWORD@HOST:PORT/DB_NAME
      # Change 'localhost' to your DB's IP address if it's on another server
      - DATABASE_URL=postgresql://myuser:mypassword@192.168.1.100:5432/existing_db
    restart: always