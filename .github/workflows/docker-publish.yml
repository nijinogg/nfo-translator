name: Docker Publish and Release

on:
  push:
    # Only trigger on version tags to prevent duplicate 'main' and 'tag' builds
    tags: 
      - 'v*.*.*'
  workflow_dispatch: # Allows you to click "Run" in the web UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup Emulation for ARM64 build (Required for QNAP/NAS)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Extract Metadata (Tags & Labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/nfo-translator
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=true

      # 4. Build and Push Multi-Arch Image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Sync README to Docker Hub Overview (Safe Mode)
      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ secrets.DOCKER_USERNAME }}/nfo-translator
          readme-filepath: README.md

  # 6. Create GitHub Release
  create-release:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## 🐳 Docker Image Info
            `docker pull ${{ secrets.DOCKER_USERNAME }}/nfo-translator:${{ github.ref_name }}`
            
            **Architectures:** `linux/amd64`, `linux/arm64` (QNAP/Synology/Raspberry Pi)